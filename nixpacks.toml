[phases.setup]
nixPkgs = ["nodejs_20", "python3", "gcc", "gnumake", "sqlite"]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps --no-audit --no-fund",
  "npm rebuild better-sqlite3 --build-from-source"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node scripts/startup.js && node_modules/.bin/next start"
